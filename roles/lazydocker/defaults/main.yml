# SPDX-License-Identifier: MIT-0
---
# Default variables for lazydocker role
# Version of lazydocker to install
lazydocker_version: "0.24.3"
# Path where the binary will be installed
lazydocker_install_path: "/usr/local/bin"
# Directory to download the archive
lazydocker_download_dir: "/tmp"
# Supported architecture mappings (ansible_architecture -> lazydocker release suffix)
# x86_64: Linux_x86_64, aarch64: Linux_arm64, armv7l: Linux_armv7
lazydocker_arch_map:
  x86_64: Linux_x86_64
  aarch64: Linux_arm64
  armv7l: Linux_armv7
# SHA256 checksums per architecture for integrity verification
# Update these when changing lazydocker_version
# Source: https://github.com/jesseduffield/lazydocker/releases/download/v<version>/checksums.txt
lazydocker_checksums:
  x86_64: "sha256:39f81a138fbd3290b5b78fa22d73793f856a2323b39241644c4fcc197718cdb4"
  aarch64: "sha256:fa233d7303f34bf2c71a8a53afd761852ad97c0dbeac4dbf806f8f06ef6e4c9e"
  armv7l: "sha256:280cdffcbb1d83e68df8052920643c3adac09a01910e4e2fdcafeae2c498fa51"
