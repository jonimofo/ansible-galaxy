---
# Default variables for lazydocker role

# lazydocker_version: Version of lazydocker to install
lazydocker_version: "0.24.3"

# lazydocker_install_path: Path where the binary will be installed
lazydocker_install_path: "/usr/local/bin"

# lazydocker_download_dir: Directory to download the archive.
# IMPORTANT: must be a role-owned subdirectory, NEVER a shared system
# directory like /tmp directly. The "Ensure download directory exists"
# task below will chmod whatever path this points at to mode 0755, which
# on /tmp would strip the sticky bit (1777 -> 0755) and break SSH agent
# forwarding for non-root users. Keep this as a subdir under /tmp.
lazydocker_download_dir: "/tmp/ansible-lazydocker"

# lazydocker_arch_map: Architecture mappings (ansible_architecture -> release suffix)
lazydocker_arch_map:
  x86_64: Linux_x86_64
  aarch64: Linux_arm64
  armv7l: Linux_armv7
