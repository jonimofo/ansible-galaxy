---
# tasks file for roles/lazydocker

- name: Verify Debian-based system
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
    fail_msg: "This role only supports Debian-based systems (Debian, Ubuntu, Raspberry Pi OS)"
    quiet: true

- name: Verify supported architecture
  ansible.builtin.assert:
    that:
      - ansible_architecture in lazydocker_arch_map
    fail_msg: "Unsupported architecture: {{ ansible_architecture }}. Supported: {{ lazydocker_arch_map.keys() | list }}"
    quiet: true

- name: Set architecture suffix for lazydocker
  ansible.builtin.set_fact:
    lazydocker_arch: "{{ lazydocker_arch_map[ansible_architecture] }}"

- name: Set lazydocker archive filename
  ansible.builtin.set_fact:
    lazydocker_archive_filename: "lazydocker_{{ lazydocker_version }}_{{ lazydocker_arch }}.tar.gz"

- name: Set download path and URL for lazydocker
  ansible.builtin.set_fact:
    lazydocker_archive_path: "{{ lazydocker_download_dir }}/{{ lazydocker_archive_filename }}"
    lazydocker_download_url: "https://github.com/jesseduffield/lazydocker/releases/download/v{{ lazydocker_version }}/{{ lazydocker_archive_filename }}"

- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ lazydocker_download_dir }}"
    state: directory
    mode: '0755'

- name: Check installed lazydocker version
  ansible.builtin.command:
    cmd: "{{ lazydocker_install_path }}/lazydocker --version"
  register: lazydocker_installed_version
  changed_when: false
  failed_when: false

- name: Determine if lazydocker install is needed
  ansible.builtin.set_fact:
    lazydocker_needs_install: >-
      {{ lazydocker_installed_version.rc != 0 or
         lazydocker_version not in (lazydocker_installed_version.stdout | default('')) }}

- name: Download lazydocker archive
  ansible.builtin.get_url:
    url: "{{ lazydocker_download_url }}"
    dest: "{{ lazydocker_archive_path }}"
    mode: '0644'
    force: true
  when: lazydocker_needs_install

- name: Extract lazydocker binary
  ansible.builtin.unarchive:
    src: "{{ lazydocker_archive_path }}"
    dest: "{{ lazydocker_install_path }}"
    remote_src: true
    include:
      - lazydocker
  when: lazydocker_needs_install

- name: Ensure lazydocker binary is executable
  ansible.builtin.file:
    path: "{{ lazydocker_install_path }}/lazydocker"
    owner: root
    group: root
    mode: '0755'
  when: lazydocker_needs_install

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "{{ lazydocker_archive_path }}"
    state: absent
  when: lazydocker_needs_install
