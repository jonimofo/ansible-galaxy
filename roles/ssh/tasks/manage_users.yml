---
- name: Configure allowed SSH users in sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers.*'
    line: "AllowUsers {{ ssh_users | map(attribute='name') | join(' ') }}"
    state: present
    create: true
    mode: '0644'
    validate: '/usr/sbin/sshd -t -f %s'
  when: ssh_users is defined and ssh_users | length > 0
  notify: Restart sshd

- name: Remove AllowUsers directive when no SSH users are defined
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers.*'
    state: absent
    validate: '/usr/sbin/sshd -t -f %s'
  when: ssh_users is not defined or ssh_users | length == 0
  notify: Restart sshd

- name: Copy authorized keys for SSH users
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.pubkey }}"
    path: "{{ item.home | default('/home/' + item.name) }}/.ssh/authorized_keys"
    exclusive: "{{ ssh_exclusive_keys }}"
    manage_dir: true
  with_items: "{{ ssh_users }}"
  when: ssh_users is defined and ssh_users | length > 0
  no_log: true
