[defaults]
# Project-local collections win over ~/.ansible/collections. Without this,
# ansible's default search order visits ~/.ansible first, silently shadowing
# any pinned local install — e.g. jonimofo.infrastructure was found at 1.0.5
# in ~/.ansible while the current 1.1.0 sat unused in .ansible/collections/.
# Only affects lint/audit/test runs inside this repo; consumer playbooks
# (ansible-astrohub-server) have their own ansible.cfg.
collections_path = .ansible/collections:~/.ansible/collections
